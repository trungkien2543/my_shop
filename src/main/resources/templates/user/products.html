<!DOCTYPE html>
<html
        lang="en"
        xmlns:th="http://www.thymeleaf.org"
>

<head>

    <meta charset="UTF-8">

    <title>Shop</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}"
    >

</head>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4 mb-5">

    <!-- TITLE -->
    <div class="text-center mb-5">

        <h2>
            Product List
        </h2>

        <p class="text-muted">
            Create your order
        </p>

    </div>

    <div
            th:if="${success}"
            class="alert alert-success"
            th:text="${success}"
    >
    </div>

    <div
            th:if="${error}"
            class="alert alert-danger"
            th:text="${error}"
    >
    </div>

    <!-- FORM -->
    <form
            method="post"
            th:action="@{/user/orders/create}"
            th:object="${order}"
    >

        <!-- CUSTOMER INFO -->
        <div class="card shadow-sm mb-4">

            <div class="card-body">

                <h4 class="mb-3">
                    Customer Information
                </h4>

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Name
                        </label>

                        <input
                                type="text"
                                th:field="*{customerName}"
                                class="form-control"
                                required
                        >

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Phone
                        </label>

                        <input
                                type="text"
                                th:field="*{customerPhone}"
                                class="form-control"
                                maxlength="10"
                                required
                        >

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Address
                        </label>

                        <input
                                type="text"
                                th:field="*{customerAddress}"
                                class="form-control"
                                required
                        >

                    </div>

                </div>

            </div>

        </div>

        <!-- ORDER ITEMS -->
        <div class="card shadow-sm">

            <div class="card-body">

                <!-- HEADER -->
                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h4>
                        Order Items
                    </h4>

                    <button
                            type="button"
                            class="btn btn-primary"
                            data-bs-toggle="modal"
                            data-bs-target="#productModal"
                    >
                        + Add Product
                    </button>

                </div>

                <!-- TABLE -->
                <div class="table-wrapper">

                    <table
                            class="table table-hover table-bordered align-middle"
                    >

                        <thead class="table-dark">

                        <tr>

                            <th>
                                Product
                            </th>

                            <th class="text-end">
                                Price
                            </th>

                            <th>
                                Stock
                            </th>

                            <th style="width: 160px;">
                                Quantity
                            </th>

                            <th style="width: 120px;">
                                Action
                            </th>

                        </tr>

                        </thead>

                        <tbody id="productTableBody">

                                        <!-- EMPTY -->
                                        <tr
                                                id="emptyRow"
                                                th:if="${#lists.isEmpty(order.items)}"
                                        >

                                            <td
                                                    colspan="5"
                                                    class="text-center text-muted"
                                            >
                                                No products selected
                                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

        <!-- BUTTON -->
        <div class="text-end mt-4">

            <button
                    type="submit"
                    class="btn btn-success btn-lg"
            >
                Create Order
            </button>

        </div>

    </form>

</div>

<!-- PRODUCT MODAL -->
<div
        class="modal fade"
        id="productModal"
        tabindex="-1"
>

    <div class="modal-dialog modal-lg modal-dialog-scrollable">

        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">

                <h5 class="modal-title">
                    Select Product
                </h5>

                <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                >
                </button>

            </div>

            <!-- BODY -->
            <div class="modal-body">

                <!-- SEARCH -->
                <div class="mb-3">

                    <input
                            type="text"
                            id="searchProduct"
                            class="form-control"
                            placeholder="Search product..."
                    >

                </div>

                <!-- PRODUCT LIST -->
                <div
                        id="productList"
                        class="list-group"
                        style="max-height: 500px; overflow-y: auto;"
                >

                    <button
                            type="button"
                            class="list-group-item list-group-item-action"

                            th:each="p : ${products}"

                            th:data-id="${p.id}"
                            th:data-name="${p.name}"
                            th:data-price="${p.price}"
                            th:data-stock="${p.quantity}"

                            onclick="addProductFromButton(this)"
                    >

                        <div class="d-flex justify-content-between align-items-center">

                            <div>

                                <strong
                                        th:text="${p.name}">
                                </strong>

                                <div
                                        class="small text-muted"
                                        th:text="'Stock: ' + ${p.quantity}">
                                </div>

                            </div>

                            <span
                                    class="fw-bold"
                                    th:text="${#numbers.formatDecimal(
                                        p.price,
                                        0,
                                        'COMMA',
                                        0,
                                        'POINT'
                                    ) + ' VNĐ'}">
                            </span>

                        </div>

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<!-- SCRIPT -->
<script>

    let index = 0;

    // SEARCH PRODUCT
    document.getElementById("searchProduct")
        .addEventListener("keyup", function () {

            const keyword =
                this.value.toLowerCase();

            const items =
                document.querySelectorAll(
                    "#productList button"
                );

            items.forEach(item => {

                const text =
                    item.innerText.toLowerCase();

                item.style.display =
                    text.includes(keyword)
                        ? ""
                        : "none";
            });
        });

    // ADD PRODUCT
    function addProductFromButton(button) {

        document.getElementById("emptyRow")
            ?.remove();

        const id =
            button.dataset.id;

        const name =
            button.dataset.name;

        const price =
            button.dataset.price;

        const stock =
            button.dataset.stock;

        // PREVENT DUPLICATE
        const existing =
            document.querySelector(
                `input[value="${id}"]`
            );

        if (existing) {

            alert("Product already selected");

            return;
        }

        const tbody =
            document.getElementById(
                "productTableBody"
            );

        const row =
            document.createElement("tr");

        row.innerHTML = `

            <td>

                ${name}

                <input
                    type="hidden"
                    name="items[${index}].productId"
                    value="${id}"
                >

            </td>

            <td class="text-end">

                ${Number(price)
                    .toLocaleString()} VNĐ

            </td>

            <td>

                ${stock}

            </td>

            <td>

                <input
                    type="number"
                    name="items[${index}].quantity"
                    class="form-control"
                    min="1"
                    max="${stock}"
                    value="1"
                    required
                >

            </td>

            <td>

                <button
                    type="button"
                    class="btn btn-danger btn-sm"
                    onclick="removeRow(this)"
                >
                    Remove
                </button>

            </td>
        `;

        tbody.appendChild(row);

        index++;

        // CLOSE MODAL
        bootstrap.Modal
            .getInstance(
                document.getElementById(
                    "productModal"
                )
            )
            .hide();
    }

    // REMOVE PRODUCT
    function removeRow(button) {

        button.closest("tr").remove();

        const tbody =
            document.getElementById(
                "productTableBody"
            );

        if (tbody.children.length === 0) {

            tbody.innerHTML = `
                <tr id="emptyRow">

                    <td
                        colspan="5"
                        class="text-center text-muted"
                    >
                        No products selected
                    </td>

                </tr>
            `;
        }
    }

</script>

</body>

</html>
