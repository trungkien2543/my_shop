<!DOCTYPE html>
<html
        lang="en"
        xmlns:th="http://www.thymeleaf.org"
>

<head>

    <meta charset="UTF-8">

    <title>Create Product</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}"
    >

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <div class="card shadow-sm">

        <div class="card-body">

            <h3 class="mb-4">
                Create Product
            </h3>

            <form
                    th:action="@{/admin/products/create}"
                    th:object="${product}"
                    method="post"
            >

                <!-- NAME -->
                <div class="mb-3">

                    <label class="form-label">
                        Product Name
                    </label>

                    <input
                            type="text"
                            th:field="*{name}"
                            class="form-control"
                            placeholder="Enter product name"
                            required
                    >

                    <div
                            class="text-danger mt-1"
                            th:if="${#fields.hasErrors('name')}"
                            th:errors="*{name}"
                    >
                    </div>

                </div>

                <!-- PRICE -->
                <div class="mb-3">

                    <label class="form-label">
                        Price
                    </label>

                    <input
                            type="number"
                            th:field="*{price}"
                            class="form-control"
                            placeholder="Enter price"
                            min="0"
                            required
                    >

                    <div
                            class="text-danger mt-1"
                            th:if="${#fields.hasErrors('price')}"
                            th:errors="*{price}"
                    >
                    </div>

                </div>

                <!-- QUANTITY -->
                <div class="mb-3">

                    <label class="form-label">
                        Quantity
                    </label>

                    <input
                            type="number"
                            th:field="*{quantity}"
                            class="form-control"
                            placeholder="Enter quantity"
                            min="0"
                            required
                    >

                    <div
                            class="text-danger mt-1"
                            th:if="${#fields.hasErrors('quantity')}"
                            th:errors="*{quantity}"
                    >
                    </div>

                </div>

                <!-- DESCRIPTION -->
                <div class="mb-3">

                    <label class="form-label">
                        Description
                    </label>

                    <textarea
                            th:field="*{description}"
                            class="form-control"
                            rows="4"
                            placeholder="Enter description"
                    ></textarea>

                </div>

                <!-- BUTTON -->
                <div class="d-flex gap-2">

                    <button
                            type="submit"
                            class="btn btn-primary"
                    >
                        Create
                    </button>

                    <a
                            th:href="@{/admin/products}"
                            class="btn btn-secondary"
                    >
                        Back
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
