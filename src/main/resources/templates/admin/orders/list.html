<!DOCTYPE html>
<html
        lang="en"
        xmlns:th="http://www.thymeleaf.org"
>

<head>

    <meta charset="UTF-8">

    <title>Admin Orders</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}"
    >

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3>
            Order Management
        </h3>

    </div>

    <div class="table-wrapper">

        <table class="table table-hover table-bordered align-middle">

            <thead class="table-dark">

            <tr>

                <th>#</th>

                <th>Customer</th>

                <th>Phone</th>

                <th>Total Price</th>

                <th>Created At</th>

                <th style="width: 120px;">
                    Actions
                </th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="o, iterStat : ${page.content}">

                <td
                        th:text="${page.number * page.size + iterStat.index + 1}">
                </td>

                <td th:text="${o.customerName}"></td>

                <td th:text="${o.customerPhone}"></td>

                <td
                        th:text="${#numbers.formatDecimal(
                            o.totalPrice,
                            0,
                            'COMMA',
                            0,
                            'POINT'
                        )}">
                </td>

                <td
                        th:text="${#temporals.format(
                            o.createdAt,
                            'HH:mm dd/MM/yyyy'
                        )}">
                </td>

                <td>

                    <a
                            th:href="@{/admin/orders/{id}(id=${o.id})}"
                            class="btn btn-info btn-sm"
                    >
                        Detail
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

    <!-- PAGINATION -->
    <nav>

        <ul class="pagination justify-content-center">

            <!-- PREVIOUS -->
            <li
                    class="page-item"
                    th:classappend="${page.first} ? 'disabled'"
            >

                <a
                        class="page-link"
                        th:href="@{/admin/orders(
                            page=${page.number - 1},
                            size=${page.size}
                        )}"
                >
                    Previous
                </a>

            </li>

            <!-- PAGE INFO -->
            <li class="page-item disabled">

                <span
                        class="page-link"
                        th:text="${page.number + 1 + ' / ' + page.totalPages}"
                >
                </span>

            </li>

            <!-- NEXT -->
            <li
                    class="page-item"
                    th:classappend="${page.last} ? 'disabled'"
            >

                <a
                        class="page-link"
                        th:href="@{/admin/orders(
                            page=${page.number + 1},
                            size=${page.size}
                        )}"
                >
                    Next
                </a>

            </li>

        </ul>

    </nav>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
