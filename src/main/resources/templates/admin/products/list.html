<!DOCTYPE html>
<html
        lang="en"
        xmlns:th="http://www.thymeleaf.org"
>

<head>

    <meta charset="UTF-8">
    <title>Admin Products</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}"
    >

</head>

<body>

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- CONTENT -->
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3>Product Management</h3>

        <a
                th:href="@{/admin/products/create}"
                class="btn btn-primary"
        >
            + Create Product
        </a>

    </div>

    <div class="table-wrapper">
        <table class="table table-hover table-bordered align-middle">

        <thead class="table-dark">

        <tr>
            <th>#</th>
            <th>

                <div class="d-flex justify-content-between align-items-center">

                    <span>Name</span>

                    <div class="d-flex flex-column sort-buttons">

                        <a
                                th:href="@{/admin/products(
                        page=${page.number},
                        size=${page.size},
                        sort='name,asc'
                    )}"
                        >
                            ▲
                        </a>

                        <a
                                th:href="@{/admin/products(
                        page=${page.number},
                        size=${page.size},
                        sort='name,desc'
                    )}"
                        >
                            ▼
                        </a>

                    </div>

                </div>

            </th>
            <th>

                <div class="d-flex justify-content-between align-items-center">

                    <span>Price</span>

                    <div class="d-flex flex-column sort-buttons">

                        <a
                                th:href="@{/admin/products(
                        page=${page.number},
                        size=${page.size},
                        sort='price,asc'
                    )}"
                        >
                            ▲
                        </a>

                        <a
                                th:href="@{/admin/products(
                        page=${page.number},
                        size=${page.size},
                        sort='price,desc'
                    )}"
                        >
                            ▼
                        </a>

                    </div>

                </div>

            </th>
            <th style="width: 220px;">Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="p, iterStat : ${page.content}">

            <td th:text="${page.number * page.size + iterStat.index + 1}"></td>

            <td th:text="${p.name}"></td>

            <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}"></td>

            <td>

                <a
                        th:href="@{/admin/products/{id}(id=${p.id})}"
                        class="btn btn-info btn-sm"
                >
                    Detail
                </a>

                <a
                        th:href="@{/admin/products/edit/{id}(id=${p.id})}"
                        class="btn btn-warning btn-sm"
                >
                    Edit
                </a>

                <form
                        th:action="@{/admin/products/delete/{id}(id=${p.id})}"
                        method="post"
                        style="display:inline;"
                >

                    <button
                            type="submit"
                            class="btn btn-danger btn-sm"
                            onclick="return confirm('Delete this product?')"
                    >
                        Delete
                    </button>

                </form>

            </td>

        </tr>

        </tbody>

    </table>
    </div>
    <nav>
        <ul class="pagination justify-content-center">

            <!-- PREVIOUS -->
            <a class="page-link"
                           th:href="@{/admin/products(
                    page=${page.number - 1},
                    size=${page.size},
                    sort=${param.sort}
               )}">
                Previous
            </a>

            <!-- PAGE INFO -->
            <li class="page-item disabled">
            <span class="page-link"
                  th:text="${page.number + 1 + ' / ' + page.totalPages}">
            </span>
            </li>

            <!-- NEXT -->
            <li class="page-item"
                th:classappend="${page.last} ? 'disabled'">

                <a class="page-link"
                                   th:href="@{/admin/products(
                        page=${page.number + 1},
                        size=${page.size},
                        sort=${param.sort}
                   )}">
                    Next
                </a>

            </li>

        </ul>
    </nav>

</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
