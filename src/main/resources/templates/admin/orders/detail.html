<!DOCTYPE html>
<html
        lang="en"
        xmlns:th="http://www.thymeleaf.org"
>

<head>

    <meta charset="UTF-8">

    <title>Order Detail</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}"
    >

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <!-- ORDER INFO -->
    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">

                <h3>
                    Order Detail
                </h3>

                <a
                        th:href="@{/admin/orders}"
                        class="btn btn-secondary"
                >
                    Back
                </a>

            </div>

            <hr>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <strong>Customer Name:</strong>

                    <p th:text="${order.customerName}"></p>

                </div>

                <div class="col-md-6 mb-3">

                    <strong>Phone:</strong>

                    <p th:text="${order.customerPhone}"></p>

                </div>

                <div class="col-md-6 mb-3">

                    <strong>Address:</strong>

                    <p th:text="${order.customerAddress}"></p>

                </div>

                <div class="col-md-6 mb-3">

                    <strong>Created At:</strong>

                    <p
                            th:text="${#temporals.format(
                                order.createdAt,
                                'HH:mm dd/MM/yyyy'
                            )}">
                    </p>

                </div>

                <div class="col-md-6 mb-3">

                    <strong>Total Price:</strong>

                    <p
                            th:text="${#numbers.formatDecimal(
                                order.totalPrice,
                                0,
                                'COMMA',
                                0,
                                'POINT'
                            )}">
                    </p>

                </div>

            </div>

        </div>

    </div>

    <!-- ORDER ITEMS -->
    <div class="card shadow-sm">

        <div class="card-body">

            <h4 class="mb-3">
                Order Items
            </h4>

            <table class="table table-bordered align-middle">

                <thead class="table-dark">

                <tr>

                    <th>#</th>

                    <th>Product</th>

                    <th>Price</th>

                    <th>Quantity</th>

                    <th>Total</th>

                </tr>

                </thead>

                <tbody>

                <tr
                        th:each="item, iterStat : ${order.items}"
                >

                    <td
                            th:text="${iterStat.index + 1}">
                    </td>

                    <td
                            th:text="${item.productName}">
                    </td>

                    <td
                            th:text="${#numbers.formatDecimal(
                                item.price,
                                0,
                                'COMMA',
                                0,
                                'POINT'
                            )}">
                    </td>

                    <td
                            th:text="${item.quantity}">
                    </td>

                    <td
                            th:text="${#numbers.formatDecimal(
                                item.total,
                                0,
                                'COMMA',
                                0,
                                'POINT'
                            )}">
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
